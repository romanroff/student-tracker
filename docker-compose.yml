services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-student_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-student_tracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_student_tracker_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-student_tracker}:${POSTGRES_PASSWORD:-local_student_tracker_password}@db:5432/${POSTGRES_DB:-student_tracker}
      BOT_TOKEN: ${BOT_TOKEN:-}
      DEV_AUTH_ENABLED: ${DEV_AUTH_ENABLED:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "-m", "backend.app.bot_launcher"]
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-student_tracker}:${POSTGRES_PASSWORD:-local_student_tracker_password}@db:5432/${POSTGRES_DB:-student_tracker}
      BOT_TOKEN: ${BOT_TOKEN:-}
      WEBAPP_URL: ${WEBAPP_URL:-}
    profiles: ["telegram"]
    depends_on:
      frontend:
        condition: service_healthy

volumes:
  postgres_data:
