name: Quality

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m ruff format --check backend tests
      - run: python -m ruff check backend tests
      - run: python -m mypy backend
      - run: python -m bandit -q -r backend
      - run: python -m pip_audit -r requirements.txt
      - run: python -m pytest -q --cov=backend --cov-report=term-missing
      - name: Verify migrations
        env:
          DATABASE_URL: sqlite:///./migration-ci.db
        run: python -m alembic upgrade head && python -m alembic downgrade base

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run build

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config
      - run: docker compose build
